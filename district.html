<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicClaw — District Report</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="./">CivicClaw</a></h1>
      <nav>
        <a href="./">&larr; All Districts</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div id="loading" class="loading">Loading report...</div>
    <div id="no-report" class="no-report" hidden>
      <h2>No report yet</h2>
      <p>We don't have a report for this district yet. Check back soon, or read the <a href="district.html?d=citywide">citywide report</a>.</p>
    </div>
    <div id="ask-bar" class="ask-bar" hidden>
      <div class="ask-bar-text">
        <strong>Want to dig deeper?</strong> Copy this report as a prompt and paste it into ChatGPT, Claude, or any AI chat.
      </div>
      <div class="ask-bar-action">
        <button id="copy-prompt" class="btn btn-ask btn-ask-lg">Copy prompt</button>
        <span id="copy-confirm" class="copy-confirm" hidden>Copied!</span>
      </div>
    </div>
    <article id="report" class="report" hidden></article>
  </main>

  <footer>
    <div class="container">
      <p>Powered by <a href="https://github.com/sgillen/sf-civic-digest" target="_blank">sf-civic-digest</a></p>
    </div>
  </footer>

  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const d = params.get("d");

      if (!d) {
        window.location.href = "./";
        return;
      }

      const file = d === "citywide" ? "data/citywide.md" : `data/d${d}.md`;
      const label = d === "citywide" ? "Citywide" : `District ${d}`;
      document.title = `CivicClaw — ${label}`;

      let reportMd = "";

      try {
        const resp = await fetch(file);
        if (!resp.ok) throw new Error(resp.status);
        reportMd = await resp.text();

        document.getElementById("loading").hidden = true;
        const reportEl = document.getElementById("report");
        reportEl.hidden = false;
        reportEl.innerHTML = marked.parse(reportMd);

        // Make external links open in new tab
        reportEl.querySelectorAll('a[href^="http"]').forEach(a => {
          a.target = "_blank";
          a.rel = "noopener";
        });

        // Show copy-prompt button for district pages
        if (d !== "citywide") {
          document.getElementById("ask-bar").hidden = false;
        }
      } catch (e) {
        document.getElementById("loading").hidden = true;
        document.getElementById("no-report").hidden = false;
      }

      // Copy prompt handler
      document.getElementById("copy-prompt").addEventListener("click", async () => {
        const prompt = `Here is the latest civic digest for San Francisco District ${d} (as of this week). Use it to answer my questions about what's happening in my district.

When answering:
- Be concise. Lead with the answer.
- When citing meetings or deadlines, include the date, time, and what I can do (public comment, email address).
- If I ask about something not in the report, say so and suggest where to look:
  Board agendas: sfgov.legistar.com | Permits: sfplanninggis.org/pim | 311: sf311.org
  Elections: sfelections.org | Ethics: sfethics.org | Cleanups: refuserefusesf.org/cleanups
  Meeting transcripts: sfgovernmentconnection.com | Rent Board: sf.gov/departments/rent-board

---

${reportMd}

---

What should I know about what's happening in my district this week?`;

        try {
          await navigator.clipboard.writeText(prompt);
          const confirm = document.getElementById("copy-confirm");
          confirm.hidden = false;
          setTimeout(() => { confirm.hidden = true; }, 2000);
        } catch (e) {
          // Fallback for older browsers
          const ta = document.createElement("textarea");
          ta.value = prompt;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          const confirm = document.getElementById("copy-confirm");
          confirm.hidden = false;
          setTimeout(() => { confirm.hidden = true; }, 2000);
        }
      });
    })();
  </script>
</body>
</html>
